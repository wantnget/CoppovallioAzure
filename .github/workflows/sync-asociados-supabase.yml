name: Sync Asociados → Supabase

on:
  push:
    branches: ["main"]
    paths:
      - "Simulador_Analisis_Creditos_V3 2025.xlsx"
      - "scripts/sync_asociados.py"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  sync-asociados:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install openpyxl

      - name: Sincronizar Base_Asociados → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync_asociados.py
